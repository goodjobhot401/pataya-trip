# 自動部署到 GitHub Pages 的 GitHub Action 腳本
name: Deploy to GitHub Pages

on:
  # 當你 push 到 main 分支時觸發
  push:
    branches: ["main"]
  # 也允許你在 GitHub Actions 頁面手動觸發
  workflow_dispatch:

# 設定權限以允許部署到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 設定任務
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install --no-audit

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 打包後的檔案路徑，Vite 預設是 dist
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
